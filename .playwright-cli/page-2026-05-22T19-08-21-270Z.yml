    - generic [ref=e157]:
      - heading "Key Takeaways" [level=3] [ref=e158]
      - list [ref=e159]:
        - listitem [ref=e160]: Spain's waves were sharper and regionally heterogeneous — Madrid and Catalonia were hit earliest and hardest.
        - listitem [ref=e161]: Excess mortality reveals significant under-counting; high test positivity compounds the uncertainty.
        - listitem [ref=e162]: Vaccination reduced CFR; SARIMA forecast is highly sensitive to whether the decline phase is included in training.
        - listitem [ref=e163]: Spain's tourism-dependent economy (~12% of GDP) amplified the socio-economic shock relative to Poland.
      - paragraph [ref=e164]: "Data: OWID · ISCIII · OxCGRT · Google Mobility · Eurostat · OWID Variants"
