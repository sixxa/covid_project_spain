    - generic:
      - heading [level=3]: Key Takeaways
      - list:
        - listitem: Spain's waves were sharper and regionally heterogeneous — Madrid and Catalonia were hit earliest and hardest.
        - listitem: Excess mortality reveals significant under-counting; high test positivity compounds the uncertainty.
        - listitem: Vaccination reduced CFR; SARIMA forecast is highly sensitive to whether the decline phase is included in training.
        - listitem: Spain's tourism-dependent economy (~12% of GDP) amplified the socio-economic shock relative to Poland.
      - paragraph: "Data: OWID · ISCIII · OxCGRT · Google Mobility · Eurostat · OWID Variants"
